{% extends "auth/base.html" %}
{% block title %}新規登録 — 見積・請求管理{% endblock %}

{% block content %}
<h2 class="text-xl font-semibold text-slate-800 mb-6">新規登録</h2>

<form action="/register" method="post" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">メールアドレス</label>
    <input type="email" name="email" required autocomplete="email"
           class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">パスワード <span class="text-slate-400 font-normal">（8文字以上）</span></label>
    <input type="password" name="password" required autocomplete="new-password"
           class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">パスワード（確認）</label>
    <input type="password" name="password_confirm" required autocomplete="new-password"
           class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
  </div>
  <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors">
    登録する
  </button>
</form>

<p class="text-center text-sm text-slate-500 mt-6">
  すでにアカウントをお持ちの方は
  <a href="/login" class="text-indigo-600 hover:underline">ログイン</a>
</p>
{% endblock %}
